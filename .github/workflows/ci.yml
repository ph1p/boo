name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    if: >-
      github.event_name == 'pull_request' ||
      !startsWith(github.event.head_commit.message, 'chore') &&
      !startsWith(github.event.head_commit.message, 'docs') &&
      !startsWith(github.event.head_commit.message, 'style') &&
      !startsWith(github.event.head_commit.message, 'ci')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Boo/Resources/MonacoSource/pnpm-lock.yaml

      - name: Install swift-format
        run: brew install swift-format

      - name: Run lint
        run: make lint

  build-and-test:
    name: Build & Test
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Boo/Resources/MonacoSource/pnpm-lock.yaml

      - name: Install Zig
        run: |
          brew install zig
          zig version

      - name: Cache GhosttyKit build
        uses: actions/cache@v5
        with:
          path: |
            Vendor/ghostty/macos
            Vendor/ghostty/zig-out
            Vendor/ghostty/.zig-cache
          key: ghosttykit-macos15-${{ hashFiles('Vendor/ghostty/build.zig.zon') }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ghosttykit-macos15-

      - name: Build GhosttyKit
        run: make ghostty

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache ironmark build
        uses: actions/cache@v5
        with:
          path: Vendor/ironmark/target-macos15
          key: ironmark-macos15-${{ hashFiles('Vendor/ironmark/Cargo.lock', 'Vendor/ironmark/Cargo.toml') }}
          restore-keys: |
            ironmark-macos15-

      - name: Build ironmark
        run: make ironmark

      - name: Build
        run: make build

      - name: Test
        run: make test

  release:
    name: Release
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-15
    outputs:
      has_appcast: ${{ steps.release_outputs.outputs.has_appcast }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Boo/Resources/MonacoSource/pnpm-lock.yaml

      - name: Install Zig
        run: |
          brew install zig
          zig version

      - name: Cache GhosttyKit build
        uses: actions/cache@v5
        with:
          path: |
            Vendor/ghostty/macos
            Vendor/ghostty/zig-out
            Vendor/ghostty/.zig-cache
          key: ghosttykit-macos15-${{ hashFiles('Vendor/ghostty/build.zig.zon') }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ghosttykit-macos15-

      - name: Build GhosttyKit
        run: make ghostty

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache ironmark build
        uses: actions/cache@v5
        with:
          path: Vendor/ironmark/target-macos15
          key: ironmark-release-macos15-${{ hashFiles('Vendor/ironmark/Cargo.lock', 'Vendor/ironmark/Cargo.toml') }}
          restore-keys: |
            ironmark-release-macos15-

      - name: Build ironmark
        run: make ironmark

      - name: Import signing certificate
        if: env.CERTIFICATE_P12_BASE64 != ''
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: pnpm dlx --package=semantic-release@25.0.3 --package=@semantic-release/exec --package=@semantic-release/git --package=lodash-es@4.17.21 semantic-release

      - name: Capture release outputs
        id: release_outputs
        run: |
          if [ -f .build/updates/appcast.xml ]; then
            echo "has_appcast=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_appcast=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload generated appcast
        if: steps.release_outputs.outputs.has_appcast == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-appcast
          path: .build/updates/appcast.xml

  release-pages-build:
    name: Release Pages Build
    needs: release
    if: needs.release.outputs.has_appcast == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          name: sparkle-appcast
          path: /tmp/sparkle-appcast

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Install documentation dependencies
        run: pnpm install --frozen-lockfile
        working-directory: documentation

      - name: Inject generated Sparkle appcast
        run: |
          mkdir -p documentation/docs/public/updates
          cp /tmp/sparkle-appcast/appcast.xml documentation/docs/public/updates/appcast.xml

      - name: Build documentation site
        run: pnpm build
        working-directory: documentation

      - uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/docs/dist

  release-pages-deploy:
    name: Release Pages Deploy
    needs: release-pages-build
    if: needs.release-pages-build.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
