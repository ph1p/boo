name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install swift-format
        run: brew install swift-format

      - name: Run swift-format lint
        run: swift-format lint --strict --recursive Boo/ Tests/

  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Zig
        run: |
          brew install zig
          zig version

      - name: Cache GhosttyKit build
        uses: actions/cache@v4
        with:
          path: |
            Vendor/ghostty/macos
            Vendor/ghostty/zig-out
            Vendor/ghostty/.zig-cache
          key: ghosttykit-macos15-${{ hashFiles('Vendor/ghostty/build.zig.zon') }}-${{ hashFiles('Makefile') }}
          restore-keys: |
            ghosttykit-macos15-

      - name: Build GhosttyKit
        run: make ghostty

      - name: Build Boo
        run: swift build

      - name: Run tests
        run: make test
