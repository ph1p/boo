name: Docs

on:
  push:
    branches: [main]
    paths:
      - "documentation/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: documentation/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: documentation

      - name: Restore published Sparkle appcast
        run: |
          mkdir -p docs/public/updates
          curl -fsSL "https://ph1p.github.io/boo/updates/appcast.xml" \
            -o docs/public/updates/appcast.xml || true
        working-directory: documentation

      - name: Build
        run: pnpm build
        working-directory: documentation

      - uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/docs/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
